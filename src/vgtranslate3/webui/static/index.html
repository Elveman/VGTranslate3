<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGTranslate3 - Live Translation Monitor</title>
    <script src="lib/alpinejs.min.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div x-data="translationMonitor()" x-init="init()">
        <!-- Header -->
        <header>
            <h1>VGTranslate3 Live Monitor</h1>
            <div class="actions">
                <button class="export" @click="exportData()">📥 Export</button>
                <button class="clear" @click="clearHistory()">🗑️ Clear</button>
            </div>
        </header>

        <!-- Current Translation -->
        <section>
            <h2>Current Translation</h2>
            <div class="grid-3">
                <!-- Original -->
                <div class="card">
                    <h3>Original Image</h3>
                    <img :src="current.original_image || ''" alt="Original" x-show="current.original_image">
                    <p class="no-data" x-show="!current.original_image">No image</p>
                </div>
                
                <!-- BBox Visualization -->
                <div class="card">
                    <h3>Bounding Boxes</h3>
                    <img :src="current.bbox_image || ''" alt="BBox" x-show="current.bbox_image">
                    <p class="no-data" x-show="!current.bbox_image">No image</p>
                </div>
                
                <!-- Result -->
                <div class="card">
                    <h3>Translated Result</h3>
                    <img :src="current.result_image || ''" alt="Result" x-show="current.result_image">
                    <p class="no-data" x-show="!current.result_image">No image</p>
                </div>
            </div>
        </section>

        <!-- Translation Blocks -->
        <section>
            <h2>Translation Blocks</h2>
            <div>
                <template x-for="(block, index) in current.blocks" :key="index">
                    <div class="block-item">
                        <div>
                            <span class="bbox-label">
                                📦 [<span x-text="block.bounding_box?.x || 0"></span>, 
                                <span x-text="block.bounding_box?.y || 0"></span>, 
                                <span x-text="block.bounding_box?.w || 0"></span>×<span x-text="block.bounding_box?.h || 0"></span>]
                            </span>
                            <span class="block-number">#<span x-text="index + 1"></span></span>
                            <span class="language-tag" x-text="block.language || 'unknown'"></span>
                        </div>
                        <div class="grid-2">
                            <div>
                                <span class="metric-label">Original:</span>
                                <p class="original-text font-japanese" x-text="block.source_text || block.text"></p>
                            </div>
                            <div>
                                <span class="metric-label">Translation:</span>
                                <p class="translation-text" x-text="getTranslation(block)"></p>
                            </div>
                        </div>
                    </div>
                </template>
                <template x-if="current.blocks?.length === 0">
                    <p class="no-data">No text detected</p>
                </template>
            </div>
        </section>

        <!-- Metrics -->
        <section>
            <h2>Metrics</h2>
            <div class="grid-4">
                <div class="metric-card">
                    <span class="metric-label">⏱️ Total Latency</span>
                    <p class="metric-value" x-text="current.metrics?.total_latency?.toFixed(2) + 's' || 'N/A'"></p>
                </div>
                <div class="metric-card">
                    <span class="metric-label">🎯 OCR Provider</span>
                    <p class="metric-value" x-text="current.metrics?.ocr_provider || 'N/A'"></p>
                </div>
                <div class="metric-card">
                    <span class="metric-label">🌐 Translation</span>
                    <p class="metric-value" x-text="current.metrics?.translation_provider || 'N/A'"></p>
                </div>
                <div class="metric-card">
                    <span class="metric-label">🔊 TTS</span>
                    <p class="metric-value" x-text="current.metrics?.tts_enabled ? '✅ Enabled' : '❌ Disabled'"></p>
                </div>
            </div>
        </section>

        <!-- History -->
        <section>
            <h2>History (Last 10)</h2>
            <div class="grid-5">
                <template x-for="(item, index) in history" :key="item.timestamp">
                    <div class="history-item" @click="loadFromHistory(index)">
                        <img :src="item.result_image" alt="History">
                        <div class="history-overlay">
                            <span x-text="new Date(item.timestamp).toLocaleTimeString()"></span>
                            <span x-text="item.metrics?.ocr_provider"></span>
                        </div>
                        <div class="history-number">#<span x-text="history.length - index"></span></div>
                    </div>
                </template>
                <template x-if="history.length === 0">
                    <p class="no-data" style="grid-column: 1/-1;">No history yet</p>
                </template>
            </div>
        </section>

        <!-- Status Bar -->
        <div class="status-bar">
            <div>
                <span>🔗 WebSocket:</span>
                <span class="status-connected" x-show="ws_connected">Connected</span>
                <span class="status-disconnected" x-show="!ws_connected">Disconnected</span>
                <span style="float: right;">History: <span x-text="history.length"></span> items</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
